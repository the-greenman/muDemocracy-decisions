name: Pull Request Validation

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect DB-related changes
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.local-filter.outputs.db || steps.filter.outputs.db }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure database environment
        run: |
          echo "DATABASE_URL=postgresql://decision_logger:decision_logger@localhost:5433/decision_logger_dev" >> "$GITHUB_ENV"
          echo "TEST_DATABASE_URL=postgresql://decision_logger:decision_logger@localhost:5433/decision_logger_test" >> "$GITHUB_ENV"
          echo "PGHOST=localhost" >> "$GITHUB_ENV"
          echo "PGPORT=5433" >> "$GITHUB_ENV"
          echo "PGUSER=decision_logger" >> "$GITHUB_ENV"
          echo "PGPASSWORD=decision_logger" >> "$GITHUB_ENV"
      - name: Detect path changes locally for act
        id: local-filter
        if: ${{ env.ACT == 'true' }}
        run: echo "db=true" >> "$GITHUB_OUTPUT"
      - name: Detect path changes
        id: filter
        if: ${{ env.ACT != 'true' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            db:
              - 'packages/db/**'
              - 'packages/schema/**'
              - 'scripts/init-db.sql'
              - 'pnpm-lock.yaml'

  fast-validation:
    name: Validate Fast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure database environment
        run: |
          echo "DATABASE_URL=postgresql://decision_logger:decision_logger@localhost:5433/decision_logger_dev" >> "$GITHUB_ENV"
          echo "TEST_DATABASE_URL=postgresql://decision_logger:decision_logger@localhost:5433/decision_logger_test" >> "$GITHUB_ENV"
          echo "PGHOST=localhost" >> "$GITHUB_ENV"
          echo "PGPORT=5433" >> "$GITHUB_ENV"
          echo "PGUSER=decision_logger" >> "$GITHUB_ENV"
          echo "PGPASSWORD=decision_logger" >> "$GITHUB_ENV"
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fast validation
        run: pnpm validate:fast

  build:
    name: Build Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure database environment
        run: |
          echo "DATABASE_URL=postgresql://decision_logger:decision_logger@localhost:5433/decision_logger_dev" >> "$GITHUB_ENV"
          echo "TEST_DATABASE_URL=postgresql://decision_logger:decision_logger@localhost:5433/decision_logger_test" >> "$GITHUB_ENV"
          echo "PGHOST=localhost" >> "$GITHUB_ENV"
          echo "PGPORT=5433" >> "$GITHUB_ENV"
          echo "PGUSER=decision_logger" >> "$GITHUB_ENV"
          echo "PGPASSWORD=decision_logger" >> "$GITHUB_ENV"
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

  db-validation:
    name: Validate DB Changes
    needs: changes
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: decision_logger
          POSTGRES_PASSWORD: decision_logger
          POSTGRES_DB: decision_logger_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U decision_logger -d decision_logger_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure database environment
        run: |
          echo "DATABASE_URL=postgresql://decision_logger:decision_logger@localhost:5433/decision_logger_dev" >> "$GITHUB_ENV"
          echo "TEST_DATABASE_URL=postgresql://decision_logger:decision_logger@localhost:5433/decision_logger_test" >> "$GITHUB_ENV"
          echo "PGHOST=localhost" >> "$GITHUB_ENV"
          echo "PGPORT=5433" >> "$GITHUB_ENV"
          echo "PGUSER=decision_logger" >> "$GITHUB_ENV"
          echo "PGPASSWORD=decision_logger" >> "$GITHUB_ENV"
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test database
        run: |
          pnpm --filter @repo/db exec node --input-type=module - <<'EOF'
          import postgres from "postgres";

          const sql = postgres(
            `postgresql://${process.env.PGUSER}:${process.env.PGPASSWORD}@${process.env.PGHOST}:${process.env.PGPORT}/postgres`,
            { prepare: false },
          );

          try {
            await sql.unsafe("CREATE DATABASE decision_logger_test");
          } catch (error) {
            if (error && typeof error === "object" && "code" in error && error.code !== "42P04") {
              throw error;
            }
          } finally {
            await sql.end();
          }
          EOF

      - name: Run DB validation
        run: pnpm validate:db
