services:
  postgres:
    image: postgres:16-alpine
    container_name: mu-democracy-db
    environment:
      POSTGRES_USER: decision_logger
      POSTGRES_PASSWORD: decision_logger
      POSTGRES_DB: decision_logger_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decision_logger -d decision_logger_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Drizzle Studio for DB inspection
  # Uncomment if you want a web UI for the database
  # drizzle-studio:
  #   image: node:20-alpine
  #   container_name: mu-democracy-studio
  #   working_dir: /app
  #   volumes:
  #     - .:/app
  #   command: npx drizzle-kit studio
  #   ports:
  #     - "4983:4983"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://decision_logger:dev_password@postgres:5432/decision_logger_dev

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mu-democracy-api
    environment:
      DATABASE_URL: postgresql://decision_logger:decision_logger@postgres:5432/decision_logger_dev
      PORT: 3000
      NODE_ENV: production
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      USE_TEMPLATE_PROMPT: ${USE_TEMPLATE_PROMPT:-false}
    ports:
      - "${COMPOSE_API_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: node /app/apps/api/dist/index.js

  transcription:
    build:
      context: .
      dockerfile: apps/transcription/Dockerfile
    container_name: mu-democracy-transcription
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-openai}
      WHISPER_LOCAL_URL: ${WHISPER_LOCAL_URL:-http://whisper:9000}
      DECISION_LOGGER_API_KEY: ${DECISION_LOGGER_API_KEY:-}
      TRANSCRIPTION_CORS_ORIGIN: ${TRANSCRIPTION_CORS_ORIGIN:-*}
      STREAM_MAX_RETRY_ATTEMPTS: ${STREAM_MAX_RETRY_ATTEMPTS:-5}
      STREAM_RETRY_BASE_MS: ${STREAM_RETRY_BASE_MS:-250}
      STREAM_MAX_OUTBOUND_QUEUE: ${STREAM_MAX_OUTBOUND_QUEUE:-200}
      TRANSCRIPTION_MAX_CHUNK_BYTES: ${TRANSCRIPTION_MAX_CHUNK_BYTES:-25000000}
    ports:
      - "${COMPOSE_TRANSCRIPTION_PORT:-8788}:8788"
    depends_on:
      api:
        condition: service_started
    command: node /app/apps/transcription/dist/index.js serve --api-url http://api:3000 --host 0.0.0.0 --port 8788

volumes:
  postgres_data:
    driver: local
